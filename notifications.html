/* Notification items */
.notif-card { background: #0f2040; border: 1px solid rgba(201,148,58,0.2); border-radius: 12px; overflow: hidden; }
.notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 1rem 1.25rem; border-bottom: 1px solid rgba(201,148,58,0.07); transition: background 0.15s; }
.notif-item:last-child { border-bottom: none; }
.notif-item.unread { background: rgba(201,148,58,0.04); }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #c9943a; flex-shrink: 0; margin-top: 6px; }
.notif-dot.read { background: transparent; border: 1px solid rgba(138,154,181,0.3); }
.notif-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.notif-icon.green  { background: rgba(76,175,130,0.12); }
.notif-icon.yellow { background: rgba(232,184,90,0.12); }
.notif-icon.blue   { background: rgba(126,184,247,0.12); }
.notif-body { flex: 1; min-width: 0; }
.notif-title { font-size: 0.88rem; font-weight: 500; color: #f0ece3; -webkit-text-fill-color: #f0ece3; margin-bottom: 3px; }
.notif-msg   { font-size: 0.8rem; color: #8a9ab5; -webkit-text-fill-color: #8a9ab5; line-height: 1.4; }

  <script>
    const firebaseConfig = {
      apiKey:"AIzaSyDjspj1rS3F3zt_VhCvY6ypDsU9IfAAvP0",authDomain:"shipremit.firebaseapp.com",
      databaseURL:"https://shipremit-default-rtdb.firebaseio.com",projectId:"shipremit",
      storageBucket:"shipremit.firebasestorage.app",messagingSenderId:"516183209213",
      appId:"1:516183209213:web:d2ffdaa25b14b96de17a94"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db   = firebase.database();

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'login.html'; return; }
      try {
        const snap = await db.ref('users/' + user.uid).once('value');
        const p = snap.val() || {};
        document.getElementById('sidebarName').textContent = p.fullName || user.displayName || 'User';
        document.getElementById('sidebarRank').textContent = p.rank || 'Seafarer';
      } catch(e) {}
      loadNotifications(user);
    });

    async function loadNotifications(user) {
      const list = document.getElementById('notifList');
      try {
        // Load recent transactions as notifications
        const snap = await db.ref('transactions').orderByChild('senderUid').equalTo(user.uid).once('value');
        const data = snap.val() || {};
        const txs  = Object.entries(data)
          .map(([id,t]) => ({id,...t}))
          .sort((a,b) => (b.createdAt||0)-(a.createdAt||0))
          .slice(0, 20);

        // Load announcement
        const settingsSnap = await db.ref('settings/announcement').once('value');
        const announcement = settingsSnap.val();

        const notifs = [];

        if (announcement) {
          notifs.push({
            icon: '📢', iconClass: 'yellow',
            title: 'Announcement',
            msg: announcement,
            time: 'From admin',
            unread: true
          });
        }

        txs.forEach(tx => {
          const statusMap = {
            completed:  { icon: '✅', cls: 'green', title: 'Transfer Completed',   msg: `Your transfer of $${fmt(tx.amount)} to ${tx.recipientName||'recipient'} was completed.` },
            pending:    { icon: '⏳', cls: 'yellow', title: 'Transfer Pending',     msg: `Your transfer of $${fmt(tx.amount)} to ${tx.recipientName||'recipient'} is awaiting processing.` },
            processing: { icon: '🔄', cls: 'blue',   title: 'Transfer Processing',  msg: `Your transfer of $${fmt(tx.amount)} to ${tx.recipientName||'recipient'} is being processed.` },
            failed:     { icon: '❌', cls: 'red',    title: 'Transfer Failed',      msg: `Your transfer of $${fmt(tx.amount)} to ${tx.recipientName||'recipient'} failed. Please contact support.` },
          };
          const s = statusMap[tx.status] || statusMap.pending;
          notifs.push({
            icon: s.icon, iconClass: s.cls,
            title: s.title, msg: s.msg,
            time: tx.createdAt ? new Date(tx.createdAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—',
            unread: tx.status === 'pending' || tx.status === 'processing'
          });
        });

        if (!notifs.length) {
          list.innerHTML = `<div class="empty-state">
            <span class="empty-icon">🔔</span>
            <div class="empty-title">No notifications yet</div>
            <div class="empty-sub">You'll see transaction updates and announcements here.</div>
          </div>`;
          return;
        }

        list.innerHTML = notifs.map(n => `
          <div class="notif-item ${n.unread?'unread':''}">
            <div class="notif-dot ${n.unread?'':'read'}"></div>
            <div class="notif-icon ${n.iconClass||''}">${n.icon}</div>
            <div class="notif-body">
              <div class="notif-title">${n.title}</div>
              <div class="notif-msg">${n.msg}</div>
              <div class="notif-time">${n.time}</div>
            </div>
          </div>`).join('');

      } catch(e) {
        list.innerHTML = `<div class="empty-state">
          <span class="empty-icon">🔔</span>
          <div class="empty-title">Could not load notifications</div>
          <div class="empty-sub">Please try again later.</div>
        </div>`;
      }
    }

    function fmt(n) { return Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

    // ── Auto-hide mobile header on scroll ─────────────────────────────────────
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      const header = document.querySelector('.mobile-header');
      if (!header) return;
      const current = window.scrollY;
      if (current > lastScroll && current > 60) {
        header.classList.add('hide');
      } else {
        header.classList.remove('hide');
      }
      lastScroll = current <= 0 ? 0 : current;
    }, { passive: true });

    function logout()       { auth.signOut().then(() => location.href='login.html'); }
        function openSidebar()  {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
      const h = document.querySelector('.mobile-header');
      if (h) h.classList.add('hide');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
      const h = document.querySelector('.mobile-header');
      if (h) h.classList.remove('hide');
    }
  </script>
